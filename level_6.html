<!DOCTYPE html>
<html lang="ar">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full Screen Square Game</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="game-container">

        <div class="ui-layer">
            <div class="esc-btn"></div>
            <span>Esc</span>
        </div>

        <div class="container">

            <div id="level-layout">

                <!-- Player -->
                <div id="player">
                    <div class="face"></div>
                </div>

                <!-- Door -->
                <div class="door"></div>

                <!-- First Spike -->
                <div class="spike-group dynamic-spike" style="left: 40%;">
                    <div class="spike"></div>
                    <div class="spike"></div>
                    <div class="spike"></div>
                    <div class="spike"></div>
                </div>

                <!-- Second Spike -->
                <div class="spike-group second-spike" style="left: 70%;">
                    <div class="spike"></div>
                    <div class="spike"></div>
                    <div class="spike"></div>
                    <div class="spike"></div>
                </div>

            </div>

        </div>

    </div>

    <script src="script.js">
    </script>

</body>

</html>
